monitor=eDP-1,2560x1440@165,0x0, 1.5

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

general {
    gaps_in = 4
    gaps_out = 6
    border_size = 1
    col.active_border = rgba(7e9cd8ff)
    col.inactive_border = rgba(54546d55)
    layout = dwindle
}

animations {
    enabled = false
}

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

dwindle {
    preserve_split = true
}

exec-once = dunst
exec-once = sleep 1 && waybar
exec-once = foot --server
exec-once = wl-paste --type text --watch cliphist store
exec-once = swww-daemon
exec-once = hypridle
exec-once = waypaper --restore
exec-once = nm-applet --indicator
exec-once = swayosd-server
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = gsettings set org.gnome.desktop.interface gtk-theme Adwaita-dark

$mod = SUPER

bind = $mod, Return, exec, foot
bind = $mod, Q, killactive
bind = $mod, Space, exec, fuzzel
bind = $mod SHIFT, E, exit
bind = $mod, F, fullscreen, 1
bind = $mod, N, exec, dunstctl set-paused toggle
bind = $mod, P, exec, /home/tejas/.local/bin/powermenu
#bind = $mod, P, exec, wlogout
bind = ,Print, exec, /home/tejas/.local/bin/screenshot
bind = SHIFT, Print, exec, /home/tejas/.local/bin/screenshot area
bind = $mod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = $mod, L, exec, hyprlock
bind = $mod, W, exec, waypaper
bind = $mod, E, exec, thunar


bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

#application keybinds
bind = $mod, B, exec, firefox

# Volume (plain F keys since Fn+F keys are intercepted by firmware)
bindel = , F2, exec, swayosd-client --output-volume lower
bindel = , F3, exec, swayosd-client --output-volume raise
bindel = , F4, exec, swayosd-client --output-volume mute-toggle

# Brightness
bindel = , F5, exec, swayosd-client --brightness lower
bindel = , F6, exec, swayosd-client --brightness raise

# Workspace rules
windowrule {
    name = terminal-ws
    match:class = foot
    workspace = 1
}

windowrule {
    name = firefox-ws
    match:class = firefox
    workspace = 2
}

windowrule {
    name = obsidian-ws
    match:class = obsidian
    workspace = 3
}

windowrule {
    name = pdf-ws
    match:class = zathura
    workspace = 4
}

windowrule {
    name = discord-ws
    match:class = vesktop
    workspace = 5
}

windowrule {
    name = blueman-float
    match:class = blueman-manager
    float = true
    size = 600 400
    center = true
}

windowrule {
    name = nm-float
    match:class = nm-connection-editor
    float = true
    size = 600 400
    center = true
}

windowrule {
    name = pavucontrol-float
    match:class = Pavucontrol
    float = true
    size = 600 400
    center = true
}

windowrule {
    name = waypaper-float
    match:class = waypaper
    float = true
    size = 800 600
    center = true
}

env = PATH,$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/bin
