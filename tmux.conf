# Change prefix from Ctrl+b to Ctrl+a (much easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes with easier keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes with Alt+arrow (no prefix needed)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Resize panes
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# Mouse support (useful while learning)
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1

# No delay on escape (critical for Neovim)
set -sg escape-time 0

# Increase scrollback
set -g history-limit 10000

# Status bar minimal
set -g status-style bg=black,fg=white
set -g status-left ''
set -g status-right ' #S '
set -g status-position bottom

# Kanagawa Dragon theme
set -g status-style bg=#0d0d0d,fg=#c5c9c5
set -g status-left ''
set -g status-right '#[fg=#7e9cd8] #S '
set -g pane-border-style fg=#54546d
set -g pane-active-border-style fg=#7e9cd8
set -g window-status-current-style fg=#7e9cd8
