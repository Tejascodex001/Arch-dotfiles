# ── Prefix ────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Core settings ─────────────────────────────────────────
set -sg escape-time 0
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g set-clipboard on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Split panes ───────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (Alt+hjkl, no prefix needed) ──────────
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# ── Pane resizing (prefix + HJKL) ─────────────────────────
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5

# ── Window navigation ─────────────────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-n next-window
bind -n M-p previous-window

# ── Copy mode (vi keys) ───────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi r send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# ── Session management ────────────────────────────────────
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session
bind s choose-session

# ── Reload config ─────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Status bar — Kanagawa Dragon ──────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colors
set -g status-style "bg=#0d0d0d,fg=#c5c9c5"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#7e9cd8,fg=#0d0d0d,bold] #S #[bg=#0d0d0d,fg=#7e9cd8] "

# Right: battery + time
set -g status-right-length 80
set -g status-right "#[fg=#54546d]#[fg=#c5c9c5,bg=#1a1a22] #{battery} #[fg=#54546d]│#[fg=#c5c9c5] %a %d %b #[fg=#7e9cd8,bold] %H:%M "

# Window tabs
set -g window-status-format "#[fg=#54546d] #I:#W "
set -g window-status-current-format "#[fg=#7e9cd8,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#1a1a22"
set -g pane-active-border-style "fg=#7e9cd8"

# Message bar
set -g message-style "bg=#1a1a22,fg=#c5c9c5"

# Copy mode highlight
set -g mode-style "bg=#2d4f67,fg=#c5c9c5"

# ── Plugins ───────────────────────────────────────────────

run ~/.config/tmux/plugins/tmux-battery/battery.tmux
run ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux
run ~/.config/tmux/plugins/tmux-continuum/continuum.tmux

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'
