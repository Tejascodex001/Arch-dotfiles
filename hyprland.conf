monitor=,preferred,auto,auto

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

general {
    gaps_in = 4
    gaps_out = 6
    border_size = 1
    col.active_border = rgba(7e9cd8ff)
    col.inactive_border = rgba(54546d55)
    layout = dwindle
}

animations {
    enabled = false
}

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

dwindle {
    preserve_split = true
}

exec-once = dunst
exec-once = sleep 1 && waybar
exec-once = foot --server
exec-once = wl-paste --type text --watch cliphist store
exec-once = swww-daemon
exec-once = hypridle
exec-once = swww img $(cat ~/.cache/last_wallpaper 2>/dev/null || echo "")
exec-once = nm-applet --indicator

$mod = SUPER

bind = $mod, Return, exec, foot
bind = $mod, Q, killactive
bind = $mod, Space, exec, fuzzel
bind = $mod SHIFT, E, exit
bind = $mod, F, fullscreen, 1
bind = $mod, P, exec, /home/produser/.local/bin/powermenu
bind = ,Print, exec, /home/produser/.local/bin/screenshot
bind = SHIFT, Print, exec, /home/produser/.local/bin/screenshot area
bind = $mod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = $mod, L, exec, hyprlock

bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

#application keybinds
bind = $mod, B, exec, firefox

# Volume and brightness (laptop keys)
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -d intel_backlight set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -d intel_backlight set 5%-

# Workspace rules
windowrule {
    name = terminal-ws
    match:class = foot
    workspace = 1
}

windowrule {
    name = firefox-ws
    match:class = firefox
    workspace = 2
}

windowrule {
    name = obsidian-ws
    match:class = obsidian
    workspace = 3
}

windowrule {
    name = pdf-ws
    match:class = zathura
    workspace = 4
}

windowrule {
    name = discord-ws
    match:class = discord
    workspace = 5
}

windowrule {
    name = blueman-float
    match:class = blueman-manager
    float = true
    size = 600 400
    center = true
}

windowrule {
    name = nm-float
    match:class = nm-connection-editor
    float = true
    size = 600 400
    center = true
}

windowrule {
    name = pavucontrol-float
    match:class = Pavucontrol
    float = true
    size = 600 400
    center = true
}

env = PATH,$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/bin
